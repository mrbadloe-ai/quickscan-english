
<!doctype html>
<html lang="en">
<head>

<title>QuickScan 5 Elements - The White Umbrella</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--ink:#191716;--muted:#625f5b;--orange:#eb8113;--orange-dark:#bc670f;--soft:#fff5ec;--line:#f9d9b7;--paper:#fff;--teal:#2a6b6b;--teal-light:#e8f4f4}
*{box-sizing:border-box}body{margin:0;background:#fff;color:var(--ink);font-family:"Segoe UI",Arial,sans-serif;line-height:1.6}
#app{width:min(980px,calc(100% - 28px));margin:0 auto;padding:24px 0 64px}
.topbar{display:flex;justify-content:space-between;gap:14px;margin-bottom:18px;color:var(--muted);font-size:.88rem}.brand{font-weight:900;color:var(--orange);text-transform:uppercase;letter-spacing:.03em}
.hero{background:linear-gradient(135deg,rgba(235,129,19,.95),rgba(188,103,15,.95));border-radius:8px;color:#fff;padding:34px;box-shadow:0 14px 42px rgba(55,35,15,.14)}.hero h1{margin:0 0 10px;font-size:clamp(2rem,5vw,4rem);line-height:1;letter-spacing:0}.hero p{margin:0;max-width:730px;color:#fff;font-size:1.02rem}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:16px}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:22px;box-shadow:0 4px 22px rgba(54,39,26,.06)}.panel h2,.panel h3{margin:0 0 10px;line-height:1.2}.panel p{color:var(--muted);margin:0 0 12px}.panel p:last-child{margin-bottom:0}
label{display:block;font-weight:800;color:var(--ink);margin:14px 0 6px;font-size:.92rem}input,select{width:100%;min-height:44px;border:1px solid #e3c6aa;border-radius:6px;padding:10px 12px;background:#fff;color:var(--ink);font:inherit}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}button{border:0;border-radius:6px;min-height:44px;padding:10px 15px;font:inherit;font-weight:900;cursor:pointer}.btn{background:var(--orange);color:#fff}.btn.secondary{background:var(--soft);color:var(--ink)}
.progress{height:10px;background:#f5ddc5;border-radius:999px;overflow:hidden;margin-top:16px}.progress span{display:block;height:100%;background:var(--orange);transition:width .2s ease}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:14px}.badge{display:inline-flex;align-items:center;min-height:30px;padding:5px 10px;border-radius:999px;background:var(--soft);color:var(--orange-dark);font-weight:900;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.question{border-top:1px solid var(--line);padding:18px 0}.question:first-of-type{border-top:0}.question-title{font-weight:780;margin-bottom:12px}.scale{display:grid;grid-template-columns:150px repeat(5,minmax(38px,1fr));gap:7px;align-items:center;margin:7px 0}.scale-label{color:var(--muted);font-size:.86rem;font-weight:800}.score-btn{min-width:0;min-height:38px;padding:7px;background:#fff;border:1px solid #e3c6aa;color:var(--ink)}.score-btn.active{background:var(--orange);border-color:var(--orange);color:#fff}
.error-msg{display:none;margin-top:12px;color:#8a3021;background:#fff1ec;border:1px solid #f2c9bd;border-radius:6px;padding:10px 12px;font-weight:800}
.report-hero{background:#fff;border:1px solid var(--line);border-radius:8px;padding:26px;box-shadow:0 14px 42px rgba(55,35,15,.12)}.report-hero h1{margin:0 0 10px;font-size:clamp(1.8rem,4vw,3.2rem);line-height:1.04}.lead{color:#3f3833;font-size:1.06rem;max-width:830px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:16px}.kpi{border:1px solid var(--line);border-radius:8px;padding:14px;background:#fffaf5}.kpi strong{display:block;font-size:.78rem;color:var(--orange-dark);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.report-grid{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:14px;margin-top:14px}.domain{border-left:5px solid var(--orange)}.chart-wrap{height:265px;margin-top:10px}.callout{background:#fff5ec;border:1px solid var(--line);border-radius:8px;padding:15px;margin-top:14px}.mini-list{margin:10px 0 0;padding-left:18px;color:var(--muted)}.mini-list li{margin:6px 0}
.score-table{width:100%;border-collapse:collapse;font-size:.9rem;margin-top:10px}.score-table th,.score-table td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:left}.score-table th{color:var(--orange-dark);font-size:.75rem;text-transform:uppercase;letter-spacing:.04em}.score-table td:nth-child(2),.score-table td:nth-child(3),.score-table td:nth-child(4){text-align:center;white-space:nowrap}

/* ── Reflection block ── */
.reflection-block{background:linear-gradient(135deg,var(--teal-light) 0%,#f0f8f8 100%);border:1.5px solid #b8d8d8;border-radius:10px;padding:28px;margin-top:20px;position:relative}
.reflection-block::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--teal),#4aafaf);border-radius:10px 10px 0 0}
.reflection-block h2{color:var(--teal);margin:0 0 4px;font-size:1.25rem}
.reflection-subtitle{color:#4a7a7a;font-size:.88rem;margin:0 0 20px;font-weight:600}
.reflection-letter{color:var(--ink);font-size:1.02rem;line-height:1.8;margin:0 0 24px}
.reflection-letter p{margin:0 0 16px}.reflection-letter p:last-child{margin-bottom:0}
.reflection-step{background:#fff;border-left:4px solid var(--teal);border-radius:0 6px 6px 0;padding:14px 16px;margin:20px 0 24px;font-size:.97rem;color:var(--ink)}
.reflection-step strong{display:block;font-size:.75rem;color:var(--teal);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;font-weight:900}

/* Programme card */
.prog-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px}
.programme-card{background:#fff;border:2px solid var(--teal);border-radius:10px;padding:20px}
.programme-badge{display:inline-block;background:var(--teal);color:#fff;font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;padding:4px 10px;border-radius:4px;margin-bottom:10px}
.programme-card h3{margin:0 0 8px;color:var(--teal);font-size:1.05rem}
.programme-card p{color:var(--muted);margin:0 0 14px;font-size:.92rem}
.cta-btn{display:inline-block;background:var(--teal);color:#fff;font-weight:900;font-size:.92rem;padding:11px 20px;border-radius:6px;text-decoration:none;border:0;cursor:pointer}
.cta-btn:hover{background:#235555}
.cta-orange{background:var(--orange)}.cta-orange:hover{background:var(--orange-dark)}
.also-online{font-size:.75rem;background:#e8f4f4;color:var(--teal);padding:2px 8px;border-radius:4px;font-weight:700;margin-left:6px;vertical-align:middle}

@media(max-width:820px){#app{width:min(100% - 20px,980px);padding-top:12px}.hero{padding:26px 22px}.grid,.report-grid,.kpi-grid,.prog-grid{grid-template-columns:1fr}.section-head{display:block}.badge{margin-top:10px}.scale{grid-template-columns:1fr repeat(5,40px)}.scale-label{grid-column:1/-1}}
@media print{.topbar,.btn-row,.progress,.reflection-block{display:none!important}.panel,.report-hero{box-shadow:none;break-inside:avoid}.report-grid{grid-template-columns:1fr}.chart-wrap{height:230px}}
</style>
</head>

<script>

// ── Data ───────────────────────────────────────────────────────────────
const ELEMENTS=[{key:"Ether",theme:"space, meaning and awareness"},{key:"Air",theme:"movement, creativity and flexibility"},{key:"Fire",theme:"energy, boundaries and willpower"},{key:"Water",theme:"connection, empathy and emotional grounding"},{key:"Earth",theme:"structure, safety and realization"}];
const DOMAINS=[{key:"Private",label:"Private Life",color:"#eb8113"},{key:"Work",label:"Work",color:"#bc670f"},{key:"Development",label:"Personal Development",color:"#7a4a24"}];
const DATA={
Private:{
Ether:["I have enough time and space to reflect and organize my thoughts.","I can share my feelings and desires with the people close to me.","I feel free to be my authentic self within my family and social circle.","I experience meaning, silence or contemplation as part of my daily life."],
Air:["I can move with changes in my personal life.","I experience enough flexibility to adapt to new circumstances.","My social life feels alive without making me scattered or restless.","I experience enough lightness, playfulness and fresh impulses in my private life."],
Fire:["I feel energy and passion in my life.","I recognize my emotions and can distinguish them clearly.","I communicate my boundaries clearly.","I feel motivated to pursue personal goals."],
Water:["I experience deep connection in my most important relationships.","I can be with sadness, disappointment and vulnerability.","I can forgive without losing myself.","I can be open and vulnerable in relationships."],
Earth:["I feel safe in my private environment.","My daily rhythm gives me structure and calm.","Rituals, traditions or steady anchors support me.","People can rely on me without me losing myself in responsibility."]
},
Work:{
Ether:["I have time and space to reflect on what I do and why it matters.","I dare to share my vision with others.","I feel free to be my authentic self at work.","My work has deeper meaning for me."],
Air:["I move easily with changes at work.","I experience inspiration and spontaneity in my work.","My work environment is open to creativity and renewal.","Change is treated more as an opportunity than a threat."],
Fire:["I feel motivated and energized in my work.","I like taking the lead in projects and decisions.","I feel driven by the goals of my work or organization.","I dare to be visible with my opinion, boundaries and choices."],
Water:["My team can give and receive feedback without major resistance.","I feel connected to colleagues or team members.","I show empathy and take others' feelings into account.","I deal constructively with conflict and collaboration challenges."],
Earth:["I see how my work supports the work of others.","I see concrete results from my work.","I finish things instead of constantly starting something new.","I can plan and structure my work effectively.","My work environment feels reliable and predictable."]
},
Development:{
Ether:["I regularly create space for reflection or introspection.","I feel connected to something larger than myself.","I am curious about new insights and wisdom.","I know what I stand for and recognize my own beliefs."],
Air:["I can break old habits.","I feel a desire to keep learning and developing.","I dare to explore different directions without needing everything fixed immediately.","I feel freedom and playfulness in trying new experiences."],
Fire:["I have a clear drive to keep developing myself.","I have a clear picture of my growth ambitions.","I can set daily distractions aside for my personal growth.","I see challenges on my growth path more as opportunities than as blocks."],
Water:["I can connect my thoughts with what is happening in and around me.","I feel love and acceptance for who I am.","What I feel inside may be visible in my behavior.","I easily show compassion for myself and others."],
Earth:["I can turn my ideas into concrete actions.","I have a rhythm that supports my development.","I keep going when growth requires discipline.","I make my insights visible in choices, behavior and results."]
}
};
const TEXT={
Ether:{plus:"more space for vision, meaning and inner alignment",minus:"less distance and more grounding in everyday reality",gift:"awareness, direction and the ability to rise above the noise of the day"},
Air:{plus:"more movement, lightness, creativity and fresh perspective",minus:"more focus, calm and less fragmentation",gift:"adaptability, renewal and the ability to see differently"},
Fire:{plus:"more courage, energy, boundaries and decisive action",minus:"less pressure, struggle or overheating",gift:"drive, visibility and the ability to fully carry your choices"},
Water:{plus:"more connection, emotional safety and relational depth",minus:"more boundaries and less merging with others",gift:"empathy, attunement and the ability to deepen relationships"},
Earth:{plus:"more structure, safety, rhythm and concrete realization",minus:"less rigidity, control or heaviness",gift:"reliability, practical wisdom and the ability to make things real"}
};
const ROLE_FRAMES={"Executive / leader":"As a leader, this profile affects the space others feel to take responsibility.","Entrepreneur":"As an entrepreneur, this profile shows where vision, energy and grounding strengthen or block one another.","Professional":"As a professional, this profile shows where your strength is already visible and where you may still hold yourself back.","HR / coach":"From an HR or coaching perspective, this profile gives language to development themes beneath behavior and performance.","Academic / researcher":"In an academic or research context, this profile connects leadership practice with inner development and meaning-making.","Other":"This profile looks at leadership broadly: how you give direction to yourself, relationships and work."};

// ── Programmes ─────────────────────────────────────────────────────────
const PROGRAMMES={
keynote:{name:"Keynote",tagline:"A compelling introduction to inner leadership, spiritual intelligence and the future of leadership in the AI era.",description:"The right entry point when you want to experience the essence of this work first — in one powerful session, live or online.",online:true,url:"https://www.thewhiteumbrella.nl/contact"},
workshop:{name:"Workshop",tagline:"A facilitated experience in which leaders examine the mind, their patterns and the shift from reaction to conscious choice.",description:"A half or full day in which your profile becomes a living conversation — direct work with what is actually present in you.",online:false,url:"https://www.thewhiteumbrella.nl/contact"},
executive:{name:"Executive Development",tagline:"A development journey for leaders and organizations working on awareness, resilience, meaning and impact.",description:"A sustained journey over multiple months. For leaders who want to work all the layers in this profile — deeply and with lasting effect.",online:true,url:"https://www.thewhiteumbrella.nl/contact"}
};

// ── Reflection library ─────────────────────────────────────────────────
// 15 archetypes keyed by dominant element + secondary signal
// Each has: letter (3 paragraphs), step (concrete first action this week), programme key
const REFLECTIONS = {

// ── ETHER dominant ─────────────────────────────────────────────────
"Ether-Work": {
  p1: "Something is missing at work — and you know it isn't skill. You are capable, you deliver, you know your domain. But the work has lost its depth. What you are doing no longer connects to why you started, or to what you actually believe leadership could be. That gap between what you do and what it means is what Ether is pointing at.",
  p2: "The risk with this profile is that you keep filling the calendar without ever creating the conditions for something different to emerge. Meaning doesn't come from adding more — it comes from making space. The question your profile is asking is not 'what should I do differently?' but 'what do I need to be able to hear what is actually true for me here?'",
  step: "This week: block 45 minutes — in your agenda, as a real appointment with yourself. No screen, no agenda. Go outside or sit somewhere quiet. Ask yourself one question only: what would I do here if I weren't afraid of what others would think? Write down whatever comes. Don't edit it.",
  programme: "workshop"
},
"Ether-Development": {
  p1: "You are someone who wants to grow — genuinely. But when you look at your development profile, the space for that growth is almost entirely absent. You score what you desire high, and what you currently experience low. That is not a motivation problem. That is a permission problem. Somewhere, you have decided that real inner development is not yet for you, or not yet urgent enough.",
  p2: "What strikes me most is how consistently this shows up across the domains. It is not one area of your life that feels constricted — it is the inner dimension that runs through all of them. Ether, the element of space and consciousness, is the foundation from which everything else develops. Without it, even the most ambitious development efforts stay at the level of skill, not of who you actually become.",
  step: "This week: choose one morning and start it 20 minutes earlier than usual — but use those 20 minutes doing absolutely nothing productive. Sit, breathe, notice what is there. If that feels uncomfortable, notice that too. That discomfort is the data.",
  programme: "executive"
},
"Ether-Private": {
  p1: "In your private life, you are present — but often not really there. You are physically in the room, you fulfill the role, you take care of what needs to be taken care of. But something in you is absent. A quieter, deeper layer of yourself doesn't quite get to show up. That is what this profile is reflecting.",
  p2: "The element Ether is about space — not emptiness, but the kind of inner stillness that makes real connection possible. When that element is low in private life, you can feel a subtle loneliness even in a full house. Not because the people around you aren't good — but because you aren't fully arriving in the moments you share with them.",
  step: "This week: have one conversation at home without your phone in the room and without a next thing waiting. Give it 30 minutes. Not to fix anything or discuss anything important — just to be present without agenda. Notice what happens when you actually arrive.",
  programme: "workshop"
},

// ── AIR dominant ────────────────────────────────────────────────────
"Air-Work": {
  p1: "Your work environment has become predictable in a way that is slowly draining you. Not dramatically — nothing is wrong, really. But where there used to be creative energy, there is now routine. Where there was curiosity, there is now efficiency. Air is the element of movement, renewal and fresh perspective — and your profile shows it has gone quiet at work.",
  p2: "The pattern I see here is someone who has become very good at executing, at delivering, at being reliable — and has quietly traded in spontaneity for stability. That is an understandable trade. But it accumulates. At some point the absence of creative stimulation starts to look like fatigue, or mild cynicism, or a vague sense that you are going through the motions.",
  step: "This week: approach one regular work situation completely differently than you normally would. A meeting you usually chair — let someone else lead it. A problem you would normally analyse — sketch it instead. A decision you would normally make alone — involve an unexpected person. One thing, done differently. Notice the energy shift.",
  programme: "workshop"
},
"Air-Development": {
  p1: "You know you want to develop — but when you look at what actually happens, it has become quite narrow. You do what is expected, what is logical, what connects to your current role. The playful, exploratory dimension of growth — trying things without knowing where they lead — has faded.",
  p2: "Air in personal development is about the freedom to follow curiosity without immediately knowing the ROI. Your profile shows a longing for that kind of freedom and a reality that has become quite structured. Development has become something you plan rather than something you allow. The irony is that the most meaningful growth usually comes from the direction you didn't see coming.",
  step: "This week: do one thing purely out of curiosity — not because it is useful, not because it fits your current goals. Read the first chapter of a book outside your field. Attend something you wouldn't normally attend. Take a route you don't know. Small. Playful. No objective.",
  programme: "keynote"
},
"Air-Private": {
  p1: "Your private life has quietly become very full — of responsibilities, of structure, of things that need to happen. The lightness has gone somewhere. The spontaneity, the moments that don't serve any purpose except being alive — those are rare now.",
  p2: "This isn't about having fun more often. Air in private life is about the quality of aliveness — the sense that your days have some breath in them, some unexpected moment, some laughter that wasn't scheduled. When Air is low, life becomes a series of obligations managed well. It functions. But it doesn't quite pulse.",
  step: "This week: make one plan with someone you love that has absolutely no practical purpose. Not dinner because you need to eat — a walk without destination, a game, a conversation that wanders. Put it in your calendar before anything else fills that slot.",
  programme: "keynote"
},

// ── FIRE dominant ───────────────────────────────────────────────────
"Fire-Work": {
  p1: "There is drive here — real drive. But something is muffled. You know what you want, you can see where things need to go, and yet somehow the full weight of that vision isn't landing in your decisions and your presence at work. Fire is the element of direction, courage and visibility — and your profile shows it wants more room.",
  p2: "What often happens with this pattern is that the environment has become the excuse. The organisation isn't ready, the timing isn't right, the stakeholders need more convincing first. All of that may be true. But Fire doesn't wait for perfect conditions — it creates them. The question isn't whether the moment is right. It's whether you are willing to be seen taking a position.",
  step: "This week: say out loud, in a work context, one thing you actually think — that you would normally soften or keep to yourself. One meeting, one conversation, one email. Not aggressive, not provocative. Just honest. Notice what happens when you stop managing how it lands.",
  programme: "workshop"
},
"Fire-Work-HighFire": {
  p1: "Your Fire is already strong at work — you are visible, you lead, you drive results. But your profile also shows that this level of fire is starting to cost something. The desired score is lower than the current one, which is rare and significant. It means part of you already knows the current intensity isn't sustainable.",
  p2: "High Fire without enough Water creates friction — in teams, in relationships, and eventually in yourself. The ambition is real and valuable. The question is whether the way you are currently carrying it is actually serving the impact you want to have, or whether it is slowly narrowing the space around you.",
  step: "This week: in one situation where your instinct is to push, to correct, or to take over — pause instead. Ask a question. Wait for the answer without filling the silence. One moment of conscious restraint. Notice what becomes possible when you create space.",
  programme: "executive"
},
"Fire-Private": {
  p1: "Something in you wants to be claimed — in your private life, in how you live, in what you allow yourself to want. Your Fire score in the private domain shows a gap between where you are and where you want to be — not in ambition, but in aliveness. In whether your desires, your boundaries, your real preferences are actually present in your daily life.",
  p2: "It is easy to be clear and decisive at work, and much harder to bring that same clarity to what you want for yourself — in relationships, in how you spend your time, in what you say yes and no to. Fire in private life is about having enough inner authority to live your own life, not just a well-managed version of what everyone expects.",
  step: "This week: identify one thing in your private life that you keep tolerating — a situation, a dynamic, a habit — that you know doesn't fit who you actually are. Name it clearly, in writing. You don't have to act on it yet. But stop pretending it isn't there.",
  programme: "workshop"
},

// ── WATER dominant ──────────────────────────────────────────────────
"Water-Work": {
  p1: "There is something underneath the professional surface that isn't getting enough air at work. Connection — real connection — feels thin. You can collaborate, you can communicate, you can manage relationships. But the deeper attunement, the sense of genuine mutual presence with colleagues or your team, that layer is missing.",
  p2: "Water at work isn't about being warmer or more social. It's about whether the emotional reality of what is happening — in a project, in a team, in a difficult situation — is actually named and worked with, or whether everyone stays in the rational lane because that feels safer. Your profile suggests you want more of the former, and your environment may not have made enough room for it.",
  step: "This week: at the start of one meeting or conversation, ask a question that isn't on the agenda. Not about the work — about how the people in the room actually are. Give it 5 minutes. You don't need to facilitate it perfectly. Just open the door.",
  programme: "workshop"
},
"Water-Private": {
  p1: "Your private life profile shows a longing for deeper connection — and a current reality that is more functional than intimate. Things work. People care for each other. But somewhere the emotional depth, the vulnerability, the sense of being truly known — that layer feels thinner than you would want it to be.",
  p2: "Water in private life is about whether you can be fully present with what you and the people close to you actually feel — not managed, not minimised, not saved for later. It's about whether sadness can be sad, closeness can be close, and conflict can be honest without everything shutting down. This profile suggests that door is not yet fully open.",
  step: "This week: share something with someone close to you that you would normally keep to yourself. Not a problem to solve — something you feel, something you miss, something you are uncertain about. Keep it simple. Don't turn it into a conversation. Just let it be said.",
  programme: "workshop"
},
"Water-Development": {
  p1: "Your development profile points to something that most leadership development completely ignores: the inner emotional landscape. Not emotional intelligence as a competency — but genuine self-acceptance. The capacity to be with yourself as you actually are, not as you should be.",
  p2: "Water in personal development is about learning to listen inward without immediately judging what you hear. Your scores suggest you want more of that — more self-compassion, more honest connection to your own inner life — but that the current reality is more driven, more corrective, more focused on what still needs to improve.",
  step: "This week: at the end of each day, ask yourself one question before you open your phone or turn on the TV: 'What did I actually feel today?' Not what happened. What you felt. Write one sentence. That's all. Do it for five days.",
  programme: "executive"
},

// ── EARTH dominant ──────────────────────────────────────────────────
"Earth-Work": {
  p1: "You are someone who knows how to make things real — plans, results, structure. Earth is strong in your profile, and that is genuine strength. But something is showing up here that is worth looking at: the gap is not in results, it's in what sits underneath them. The groundedness that used to feel like an anchor is starting to feel like weight.",
  p2: "When Earth becomes the dominant mode and the other elements — especially Ether and Air — don't get enough space, work becomes a machine. Effective, yes. But also increasingly disconnected from meaning, vision and creative possibility. Your profile suggests that the structure is in place, but the life inside it is looking for more room.",
  step: "This week: in one decision you are about to make, before you go to the plan or the data — sit with the question for 10 minutes first. No notes. No Google. Just: what do I actually sense here? Then look at the data. Notice whether something shifted.",
  programme: "workshop"
},
"Earth-Development": {
  p1: "There is real discipline in your approach to development — you commit, you follow through, you value structure. Earth is strong here, and that is not nothing. Many people have all the insight without any of the follow-through. You are not one of them. But this profile is asking whether discipline alone is getting you to where you actually want to go.",
  p2: "The gap in your development profile is not in execution. It's in the more fluid dimensions — Ether, Air — the willingness to not know, to explore, to let something emerge before forcing it into a plan. Development that stays inside the comfort of structure eventually circles back to where it started. Growth requires some degree of ground that isn't solid yet.",
  step: "This week: put something on your development agenda that you cannot plan your way through. A conversation with someone whose perspective genuinely challenges yours. A skill or practice you have never tried. Something where the outcome is genuinely uncertain. Schedule it this week.",
  programme: "executive"
},

// ── BALANCED / MULTI-DOMAIN ─────────────────────────────────────────
"Multi-High": {
  p1: "What stands out most in your profile is not one urgent signal — it's the breadth of what is asking for attention. Across all three domains, across multiple elements, there is consistent movement between where you are and where you want to be. That is not a problem. It is a portrait of someone who is genuinely ready for a next chapter.",
  p2: "The risk with this kind of profile is actually taking it too seriously as a problem list — moving from one gap to the next, working on this element and then that one. That approach rarely creates lasting change. What this profile is really asking for is not a series of interventions but a deeper, sustained shift in how you lead — starting with how you lead yourself.",
  step: "This week: don't start with the biggest gap. Start with the question underneath all of them: what kind of leader do I actually want to become? Write half a page. Not goals, not competencies — who. What would it feel like to be that person on an ordinary Tuesday?",
  programme: "executive"
},
"Balanced-Low-Gap": {
  p1: "Your profile shows something that is genuinely rare: relative balance across most elements and domains. The gaps between current reality and desired state are small. That is not a sign that nothing needs to happen — it is a sign that you are working with a finer level of precision than most.",

// ── Profile matching logic ─────────────────────────────────────────────
function selectReflection(r) {
  const cells = r.cells;
  const top = r.topMoves[0];
  const avgGap = cells.reduce((s,c)=>s+c.abs,0)/cells.length;

  // Check for balanced profile
  if (avgGap < 0.6) return "Balanced-Low-Gap";

  // Check for multi-domain high gap
  const domainsWithGap = DOMAINS.filter(d =>
    ELEMENTS.some(e => r.scores[d.key][e.key].abs >= 1.2)
  ).length;
  if (domainsWithGap >= 3 && avgGap >= 1.2) return "Multi-High";

  // Special: high Fire at work
  if (top.element.key === "Fire" && top.domain.key === "Work" && top.now >= 4 && top.diff < 0) {
    return "Fire-Work-HighFire";
  }

  // Default: element + domain key
  const key = `${top.element.key}-${top.domain.key}`;
  if (REFLECTIONS[key]) return key;

  // Fallback: element only
  const elementKeys = Object.keys(REFLECTIONS).filter(k => k.startsWith(top.element.key));
  if (elementKeys.length) return elementKeys[0];

  return "Multi-High";
}

function selectProgramme(r, reflectionKey) {
  const refl = REFLECTIONS[reflectionKey];
  if (refl && refl.programme) return refl.programme;
  const avgGap = r.cells.reduce((s,c)=>s+c.abs,0)/r.cells.length;
  if (avgGap >= 1.2) return "executive";
  if (avgGap >= 0.8) return "workshop";
  return "keynote";
}

function calcReport(){const scores={},cells=[],signals=[];DOMAINS.forEach(d=>{scores[d.key]={};ELEMENTS.forEach(e=>{const answers=state.answers[d.key][e.key],now=round(avg(answers.map(a=>a.now))),desired=round(avg(answers.map(a=>a.desired))),diff=round(desired-now),abs=Math.abs(diff);scores[d.key][e.key]={now,desired,diff,abs};cells.push({domain:d,element:e,now,desired,diff,abs});answers.forEach((a,i)=>signals.push({domain:d,element:e,question:DATA[d.key][e.key][i],now:a.now,desired:a.desired,diff:a.desired-a.now,abs:Math.abs(a.desired-a.now)}));});});const topMoves=cells.slice().sort((a,b)=>b.abs-a.abs||b.desired-a.desired).slice(0,5),strengths=cells.filter(c=>c.now>=4&&c.abs<=.75).sort((a,b)=>b.now-a.now).slice(0,4),undercurrents=signals.filter(s=>s.abs>=3).sort((a,b)=>b.abs-a.abs).slice(0,4),patterns=detectPatterns(scores,topMoves,strengths);return{scores,cells,topMoves,strengths,undercurrents,patterns};}

function detectPatterns(scores,topMoves,strengths){const p=[],get=(d,e)=>scores[d][e],domainGap=d=>ELEMENTS.reduce((sum,e)=>sum+Math.max(0,get(d,e.key).diff),0);if(domainGap("Development")>=3.5)p.push({title:"You allow yourself less growth than you actually desire",text:"Your development profile shows a broader holding back. It is not one element asking for attention, but several doors standing half open. This is less about lack of potential and more about permission."});if(get("Private","Air").diff<=-.75&&get("Work","Air").diff>=.75)p.push({title:"The contrast around Air is striking",text:"In private life, Air may feel like too much movement or stimulation, while at work you long for more freedom, creativity and fresh perspective. That contrast reveals where your aliveness is expressed and where it is held back."});if(get("Work","Fire").now>=4&&get("Work","Water").diff>=.75)p.push({title:"Strong drive, but a need for more relational grounding",text:"Your work profile shows drive, while Water asks for more space. Leadership becomes more sustainable when pace, empathy and emotional safety are allowed to work together."});if(get("Private","Fire").diff>=.75&&get("Private","Water").now>=4)p.push({title:"Harmony may be softening your fire",text:"Connection seems present, but Fire wants a clearer place. The question is whether harmony sometimes comes at the cost of desire, ambition or boundaries."});if(strengths.length>=3&&topMoves[0]?.abs>=1)p.push({title:"Stability on the surface, movement underneath",text:"Several qualities are already strong. At the same time, the largest movement shows that balance is not the same as completion. A next layer of leadership may be ready to emerge."});if(!p.length)p.push({title:"This profile asks for refinement, not a radical break",text:"The differences are not extreme, but the accents matter. The growth is likely in choosing more precisely and listening sooner."});return p.slice(0,4)}

      Earth:["Take one insight you have had repeatedly and write down three concrete actions that would make it real.","Create a simple weekly rhythm for your development — even 20 minutes a day — and protect it.","Finish reading, listening to, or working through one thing you started but never completed."]
    }
  };

  const actions = ACTIONS[domainKey]?.[elemKey] || [
    "Choose one situation this week and pay deliberate attention to what is happening beneath the surface.",
    "Write down the pattern you notice most often — and what it is protecting you from.",
    "Take one small action toward the change you want, this week, without waiting for conditions to be perfect."
  ];

  if(r.patterns[0]) actions.push(`Bring this question into a conversation, your journal, or a coaching session: "${r.patterns[0].title}"`);
  return actions;
}

function avg(v){return v.reduce((s,x)=>s+x,0)/v.length}function round(v){return Math.round(v*10)/10}function signed(v){return `${v>0?"+":""}${round(v)}`}
function escapeHtml(v){return String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
function optionList(options,selected){return options.map(o=>`<option ${o===selected?"selected":""}>${o}</option>`).join("")}

render();
