<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuickScan 5 Elements - The White Umbrella</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root{--ink:#191716;--muted:#625f5b;--orange:#eb8113;--orange-dark:#bc670f;--soft:#fff5ec;--line:#f9d9b7;--paper:#fff}
    *{box-sizing:border-box} body{margin:0;background:#fff;color:var(--ink);font-family:"Segoe UI",Arial,sans-serif;line-height:1.6}
    #app{width:min(980px,calc(100% - 28px));margin:0 auto;padding:24px 0 64px}
    .topbar{display:flex;justify-content:space-between;gap:14px;margin-bottom:18px;color:var(--muted);font-size:.88rem}.brand{font-weight:900;color:var(--orange);text-transform:uppercase;letter-spacing:.03em}
    .hero{background:linear-gradient(135deg,rgba(235,129,19,.95),rgba(188,103,15,.95));border-radius:8px;color:#fff;padding:34px;box-shadow:0 14px 42px rgba(55,35,15,.14)}.hero h1{margin:0 0 10px;font-size:clamp(2rem,5vw,4rem);line-height:1;letter-spacing:0}.hero p{margin:0;max-width:730px;color:#fff;font-size:1.02rem}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:16px}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:22px;box-shadow:0 4px 22px rgba(54,39,26,.06)}.panel h2,.panel h3{margin:0 0 10px;line-height:1.2}.panel p{color:var(--muted);margin:0 0 12px}.panel p:last-child{margin-bottom:0}
    label{display:block;font-weight:800;color:var(--ink);margin:14px 0 6px;font-size:.92rem}input,select{width:100%;min-height:44px;border:1px solid #e3c6aa;border-radius:6px;padding:10px 12px;background:#fff;color:var(--ink);font:inherit}
    .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}button{border:0;border-radius:6px;min-height:44px;padding:10px 15px;font:inherit;font-weight:900;cursor:pointer}.btn{background:var(--orange);color:#fff}.btn.secondary{background:var(--soft);color:var(--ink)}.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
    .progress{height:10px;background:#f5ddc5;border-radius:999px;overflow:hidden;margin-top:16px}.progress span{display:block;height:100%;background:var(--orange);transition:width .2s ease}
    .section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:14px}.badge{display:inline-flex;align-items:center;min-height:30px;padding:5px 10px;border-radius:999px;background:var(--soft);color:var(--orange-dark);font-weight:900;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
    .question{border-top:1px solid var(--line);padding:18px 0}.question:first-of-type{border-top:0}.question-title{font-weight:780;margin-bottom:12px}.scale{display:grid;grid-template-columns:150px repeat(5,minmax(38px,1fr));gap:7px;align-items:center;margin:7px 0}.scale-label{color:var(--muted);font-size:.86rem;font-weight:800}.score-btn{min-width:0;min-height:38px;padding:7px;background:#fff;border:1px solid #e3c6aa;color:var(--ink)}.score-btn.active{background:var(--orange);border-color:var(--orange);color:#fff}
    .error{display:none;margin-top:12px;color:#8a3021;background:#fff1ec;border:1px solid #f2c9bd;border-radius:6px;padding:10px 12px;font-weight:800}
    .report-hero{background:#fff;border:1px solid var(--line);border-radius:8px;padding:26px;box-shadow:0 14px 42px rgba(55,35,15,.12)}.report-hero h1{margin:0 0 10px;font-size:clamp(1.8rem,4vw,3.2rem);line-height:1.04}.lead{color:#3f3833;font-size:1.06rem;max-width:830px}
    .kpi-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:16px}.kpi{border:1px solid var(--line);border-radius:8px;padding:14px;background:#fffaf5}.kpi strong{display:block;font-size:.78rem;color:var(--orange-dark);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
    .report-grid{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:14px;margin-top:14px}.domain{border-left:5px solid var(--orange)}.chart-wrap{height:265px;margin-top:10px}.callout{background:#fff5ec;border:1px solid var(--line);border-radius:8px;padding:15px;margin-top:14px}.mini-list{margin:10px 0 0;padding-left:18px;color:var(--muted)}.mini-list li{margin:6px 0}
    .score-table{width:100%;border-collapse:collapse;font-size:.9rem;margin-top:10px}.score-table th,.score-table td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:left}.score-table th{color:var(--orange-dark);font-size:.75rem;text-transform:uppercase;letter-spacing:.04em}.score-table td:nth-child(2),.score-table td:nth-child(3),.score-table td:nth-child(4){text-align:center;white-space:nowrap}
    @media(max-width:820px){#app{width:min(100% - 20px,980px);padding-top:12px}.hero{padding:26px 22px}.grid,.report-grid,.kpi-grid{grid-template-columns:1fr}.section-head{display:block}.badge{margin-top:10px}.scale{grid-template-columns:1fr repeat(5,40px)}.scale-label{grid-column:1/-1}}
    @media print{.topbar,.btn-row,.progress{display:none!important}.panel,.report-hero{box-shadow:none;break-inside:avoid}.report-grid{grid-template-columns:1fr}.chart-wrap{height:230px}}
  </style>
</head>
<body>
<main id="app"></main>
<script>
const ELEMENTS=[
  {key:"Ether",theme:"space, meaning and awareness"},
  {key:"Air",theme:"movement, creativity and flexibility"},
  {key:"Fire",theme:"energy, boundaries and willpower"},
  {key:"Water",theme:"connection, empathy and emotional grounding"},
  {key:"Earth",theme:"structure, safety and realization"}
];
const DOMAINS=[
  {key:"Private",label:"Private Life",color:"#eb8113"},
  {key:"Work",label:"Work",color:"#bc670f"},
  {key:"Development",label:"Personal Development",color:"#7a4a24"}
];
const DATA={
  Private:{
    Ether:["I have enough time and space to reflect and organize my thoughts.","I can share my feelings and desires with the people close to me.","I feel free to be my authentic self within my family and social circle.","I experience meaning, silence or contemplation as part of my daily life."],
    Air:["I can move with changes in my personal life.","I experience enough flexibility to adapt to new circumstances.","My social life feels alive without making me scattered or restless.","I experience enough lightness, playfulness and fresh impulses in my private life."],
    Fire:["I feel energy and passion in my life.","I recognize my emotions and can distinguish them clearly.","I communicate my boundaries clearly.","I feel motivated to pursue personal goals."],
    Water:["I experience deep connection in my most important relationships.","I can be with sadness, disappointment and vulnerability.","I can forgive without losing myself.","I can be open and vulnerable in relationships."],
    Earth:["I feel safe in my private environment.","My daily rhythm gives me structure and calm.","Rituals, traditions or steady anchors support me.","People can rely on me without me losing myself in responsibility."]
  },
  Work:{
    Ether:["I have time and space to reflect on what I do and why it matters.","I dare to share my vision with others.","I feel free to be my authentic self at work.","My work has deeper meaning for me."],
    Air:["I move easily with changes at work.","I experience inspiration and spontaneity in my work.","My work environment is open to creativity and renewal.","Change is treated more as an opportunity than a threat."],
    Fire:["I feel motivated and energized in my work.","I like taking the lead in projects and decisions.","I feel driven by the goals of my work or organization.","I dare to be visible with my opinion, boundaries and choices."],
    Water:["My team can give and receive feedback without major resistance.","I feel connected to colleagues or team members.","I show empathy and take others' feelings into account.","I deal constructively with conflict and collaboration challenges."],
    Earth:["I see how my work supports the work of others.","I see concrete results from my work.","I finish things instead of constantly starting something new.","I can plan and structure my work effectively.","My work environment feels reliable and predictable."]
  },
  Development:{
    Ether:["I regularly create space for reflection or introspection.","I feel connected to something larger than myself.","I am curious about new insights and wisdom.","I know what I stand for and recognize my own beliefs."],
    Air:["I can break old habits.","I feel a desire to keep learning and developing.","I dare to explore different directions without needing everything fixed immediately.","I feel freedom and playfulness in trying new experiences."],
    Fire:["I have a clear drive to keep developing myself.","I have a clear picture of my growth ambitions.","I can set daily distractions aside for my personal growth.","I see challenges on my growth path more as opportunities than as blocks."],
    Water:["I can connect my thoughts with what is happening in and around me.","I feel love and acceptance for who I am.","What I feel inside may be visible in my behavior.","I easily show compassion for myself and others."],
    Earth:["I can turn my ideas into concrete actions.","I have a rhythm that supports my development.","I keep going when growth requires discipline.","I make my insights visible in choices, behavior and results."]
  }
};
const TEXT={
  Ether:{plus:"more space for vision, meaning and inner alignment",minus:"less distance and more grounding in everyday reality",gift:"awareness, direction and the ability to rise above the noise of the day"},
  Air:{plus:"more movement, lightness, creativity and fresh perspective",minus:"more focus, calm and less fragmentation",gift:"adaptability, renewal and the ability to see differently"},
  Fire:{plus:"more courage, energy, boundaries and decisive action",minus:"less pressure, struggle or overheating",gift:"drive, visibility and the ability to fully carry your choices"},
  Water:{plus:"more connection, emotional safety and relational depth",minus:"more boundaries and less merging with others",gift:"empathy, attunement and the ability to deepen relationships"},
  Earth:{plus:"more structure, safety, rhythm and concrete realization",minus:"less rigidity, control or heaviness",gift:"reliability, practical wisdom and the ability to make things real"}
};
const ROLE_FRAMES={
  "Executive / leader":"As a leader, this profile affects the space others feel to take responsibility.",
  "Entrepreneur":"As an entrepreneur, this profile shows where vision, energy and grounding strengthen or block one another.",
  "Professional":"As a professional, this profile shows where your strength is already visible and where you may still hold yourself back.",
  "HR / coach":"From an HR or coaching perspective, this profile gives language to development themes beneath behavior and performance.",
  "Academic / researcher":"In an academic or research context, this profile connects leadership practice with inner development and meaning-making.",
  "Other":"This profile looks at leadership broadly: how you give direction to yourself, relationships and work."
};
let state={screen:"intro",step:0,person:{name:"",email:"",role:"Professional",focus:"Personal growth",goal:"Direction and priorities"},answers:{}};
const sections=DOMAINS.flatMap(domain=>ELEMENTS.map(element=>({domain,element})));
const app=document.getElementById("app"); let charts=[];
function ensureAnswers(){DOMAINS.forEach(d=>{state.answers[d.key]||={};ELEMENTS.forEach(e=>{state.answers[d.key][e.key]||=DATA[d.key][e.key].map(()=>({now:0,desired:0}));});});}
function render(){charts.forEach(c=>c.destroy());charts=[];ensureAnswers();if(state.screen==="intro")renderIntro();if(state.screen==="questions")renderQuestions();if(state.screen==="report")renderReport();}
function renderIntro(){app.innerHTML=`<div class="topbar"><span class="brand">The White Umbrella</span><span>QuickScan 5 Elements</span></div><section class="hero"><h1>What is asking for your attention now?</h1><p>This QuickScan reveals where strength, tension and growth potential show up across private life, work and personal development.</p></section><section class="grid"><div class="panel"><h2>Before you begin</h2><p>You answer each statement twice: how it is now and how you would ideally like to experience it. The report looks not only at scores, but at patterns, contrasts and meaningful movement.</p><label for="name">Name *</label><input id="name" value="${escapeHtml(state.person.name)}" placeholder="e.g. Archana"><label for="email">Email *</label><input id="email" type="email" value="${escapeHtml(state.person.email)}" placeholder="you@email.com"></div><div class="panel"><h2>Context</h2><p>These questions help sharpen the profile around your situation.</p><label for="role">Which role fits best?</label><select id="role">${optionList(["Executive / leader","Entrepreneur","Professional","HR / coach","Academic / researcher","Other"],state.person.role)}</select><label for="focus">What currently asks for attention?</label><select id="focus">${optionList(["Work pressure or balance","Leadership","Team or collaboration","Meaning and purpose","Personal growth","Choosing direction"],state.person.focus)}</select><label for="goal">What do you want from this scan?</label><select id="goal">${optionList(["Insight","Direction and priorities","Concrete first step","Conversation starter","Coaching reflection"],state.person.goal)}</select><div class="btn-row"><button class="btn" onclick="startScan()">Start the scan</button></div></div></section>`;}
function startScan(){const name=document.getElementById("name").value.trim(),email=document.getElementById("email").value.trim();if(!name)return alert("Please enter your name.");if(!email||!email.includes("@"))return alert("Please enter a valid email address.");state.person={name,email,role:document.getElementById("role").value,focus:document.getElementById("focus").value,goal:document.getElementById("goal").value};state.screen="questions";state.step=0;render();scrollTo(0,0);}
function renderQuestions(){const current=sections[state.step],qs=DATA[current.domain.key][current.element.key],answers=state.answers[current.domain.key][current.element.key],pct=Math.round((state.step/sections.length)*100);app.innerHTML=`<div class="topbar"><span class="brand">The White Umbrella</span><span>${state.step+1} of ${sections.length}</span></div><section class="panel"><div class="section-head"><div><h2>${current.domain.label}: ${current.element.key}</h2><p>${TEXT[current.element.key].gift}. Answer intuitively, from how you truly experience it.</p></div><span class="badge">${Math.max(1,pct)}% complete</span></div><div class="progress"><span style="width:${pct}%"></span></div>${qs.map((q,i)=>questionHtml(q,i,answers[i])).join("")}<div id="error" class="error">Please answer both current and desired scores before continuing.</div><div class="btn-row">${state.step>0?`<button class="btn secondary" onclick="prevStep()">Back</button>`:""}<button class="btn" onclick="nextStep()">${state.step===sections.length-1?"Create my profile":"Next"}</button></div></section>`;}
function questionHtml(q,i,a){return `<div class="question"><div class="question-title">${i+1}. ${q}</div>${scaleHtml(i,"now","As it is now",a.now)}${scaleHtml(i,"desired","As I want it to be",a.desired)}</div>`}
function scaleHtml(i,type,label,value){return `<div class="scale"><span class="scale-label">${label}</span>${[1,2,3,4,5].map(s=>`<button class="score-btn ${value===s?"active":""}" onclick="setScore(${i},'${type}',${s})" aria-label="${label}: ${s}">${s}</button>`).join("")}</div>`}
function setScore(i,type,score){const c=sections[state.step];state.answers[c.domain.key][c.element.key][i][type]=score;renderQuestions();}
function nextStep(){const c=sections[state.step],answers=state.answers[c.domain.key][c.element.key];if(answers.some(a=>!a.now||!a.desired)){document.getElementById("error").style.display="block";return}if(state.step<sections.length-1){state.step++;render();scrollTo(0,0)}else{state.screen="report";render();scrollTo(0,0)}}
function prevStep(){state.step--;render();scrollTo(0,0)}
function calcReport(){const scores={},cells=[],signals=[];DOMAINS.forEach(d=>{scores[d.key]={};ELEMENTS.forEach(e=>{const answers=state.answers[d.key][e.key],now=round(avg(answers.map(a=>a.now))),desired=round(avg(answers.map(a=>a.desired))),diff=round(desired-now),abs=Math.abs(diff);scores[d.key][e.key]={now,desired,diff,abs};cells.push({domain:d,element:e,now,desired,diff,abs});answers.forEach((a,i)=>signals.push({domain:d,element:e,question:DATA[d.key][e.key][i],now:a.now,desired:a.desired,diff:a.desired-a.now,abs:Math.abs(a.desired-a.now)}));});});const topMoves=cells.slice().sort((a,b)=>b.abs-a.abs||b.desired-a.desired).slice(0,5),strengths=cells.filter(c=>c.now>=4&&c.abs<=.75).sort((a,b)=>b.now-a.now).slice(0,4),undercurrents=signals.filter(s=>s.abs>=3).sort((a,b)=>b.abs-a.abs).slice(0,4),patterns=detectPatterns(scores,topMoves,strengths);return{scores,cells,topMoves,strengths,undercurrents,patterns};}
function detectPatterns(scores,topMoves,strengths){const p=[],get=(d,e)=>scores[d][e],domainGap=d=>ELEMENTS.reduce((sum,e)=>sum+Math.max(0,get(d,e.key).diff),0);if(domainGap("Development")>=3.5)p.push({title:"You allow yourself less growth than you actually desire",text:variant("dev-wide",["Your development profile shows a broader holding back. It is not one element asking for attention, but several doors standing half open.","In personal development, the distance between current reality and desire is not isolated. It suggests that growth is available, but not yet fully claimed.","This is less about lack of potential and more about permission: what part of your growth are you ready to take seriously?"])});if(get("Private","Air").diff<=-.75&&get("Work","Air").diff>=.75)p.push({title:"The contrast around Air is striking",text:"In private life, Air may feel like too much movement or stimulation, while at work you long for more freedom, creativity and fresh perspective. That contrast reveals where your aliveness is expressed and where it is held back."});if(get("Work","Fire").now>=4&&get("Work","Water").diff>=.75)p.push({title:"Strong drive, but a need for more relational grounding",text:"Your work profile shows drive, while Water asks for more space. Leadership becomes more sustainable when pace, empathy and emotional safety are allowed to work together."});if(get("Private","Fire").diff>=.75&&get("Private","Water").now>=4)p.push({title:"Harmony may be softening your fire",text:"Connection seems present, but Fire wants a clearer place. The question is whether harmony sometimes comes at the cost of desire, ambition, anger or boundaries."});if(strengths.length>=3&&topMoves[0]?.abs>=1)p.push({title:"Stability on the surface, movement underneath",text:"Several qualities are already strong. At the same time, the largest movement shows that balance is not the same as completion. A next layer of leadership may be ready to emerge."});if(!p.length)p.push({title:"This profile asks for refinement, not a radical break",text:"The differences are not extreme, but the accents matter. The growth is likely in choosing more precisely and listening sooner."});return p.slice(0,4)}
function renderReport(){const r=calcReport(),name=escapeHtml(state.person.name),top=r.topMoves[0],second=r.topMoves[1],roleText=ROLE_FRAMES[state.person.role]||ROLE_FRAMES.Other,intro=variant(`intro-${top.domain.key}-${top.element.key}`, [`${name}, your profile reveals not only where you stand, but where development is calling. ${roleText} The strongest signal is ${top.element.key} in ${top.domain.label}: ${top.diff>0?TEXT[top.element.key].plus:TEXT[top.element.key].minus}. ${second?`${second.element.key} in ${second.domain.label} adds a second layer to the picture.`:""}`,`${name}, the scan shows a profile with existing strengths and places where something wants to move. ${roleText} The clearest movement appears around ${top.element.key} in ${top.domain.label}: ${top.diff>0?TEXT[top.element.key].plus:TEXT[top.element.key].minus}. ${second?`Behind that, ${second.element.key} in ${second.domain.label} offers additional nuance.`:""}`]);app.innerHTML=`<div class="topbar"><span class="brand">The White Umbrella</span><span>Personal Leadership Profile</span></div><section class="report-hero"><h1>Personal Leadership Profile ${name}</h1><p class="lead">${intro}</p><div class="kpi-grid"><div class="kpi"><strong>Focus</strong>${escapeHtml(state.person.focus)}</div><div class="kpi"><strong>Goal</strong>${escapeHtml(state.person.goal)}</div><div class="kpi"><strong>Largest movement</strong>${top.element.key} in ${top.domain.label}</div></div><div class="btn-row"><button class="btn" onclick="window.print()">Download or print report</button><button class="btn secondary" onclick="state.screen='intro';render();scrollTo(0,0)">New scan</button></div></section><section class="report-grid"><div><div class="panel"><h2>Beneath the surface</h2>${r.patterns.map(p=>`<div class="callout"><h3>${p.title}</h3><p>${p.text}</p></div>`).join("")}</div>${DOMAINS.map(d=>domainReportHtml(d,r)).join("")}<div class="panel"><h2>Your next step</h2><p>${nextStepText(r)}</p><ul class="mini-list">${actionItems(r).map(i=>`<li>${i}</li>`).join("")}</ul></div></div><aside><div class="panel"><h3>Most meaningful signals</h3><table class="score-table"><thead><tr><th>Theme</th><th>Now</th><th>Desired</th><th>Gap</th></tr></thead><tbody>${r.topMoves.map(c=>`<tr><td>${c.domain.label}<br><strong>${c.element.key}</strong></td><td>${c.now}</td><td>${c.desired}</td><td>${signed(c.diff)}</td></tr>`).join("")}</tbody></table></div><div class="panel"><h3>Concrete outliers</h3>${r.undercurrents.length?`<ul class="mini-list">${r.undercurrents.map(s=>`<li><strong>${s.domain.label} - ${s.element.key}:</strong> ${s.question}</li>`).join("")}</ul>`:`<p>No extreme question-level gaps. The nuance is mainly in the overall pattern.</p>`}</div></aside></section>`;setTimeout(()=>DOMAINS.forEach(d=>{const cv=document.getElementById(`chart-${d.key}`);if(!cv)return;charts.push(new Chart(cv,{type:"radar",data:{labels:ELEMENTS.map(e=>e.key),datasets:[{label:"Now",data:ELEMENTS.map(e=>r.scores[d.key][e.key].now),borderColor:d.color,backgroundColor:`${d.color}22`,pointBackgroundColor:d.color,borderWidth:2},{label:"Desired",data:ELEMENTS.map(e=>r.scores[d.key][e.key].desired),borderColor:`${d.color}99`,backgroundColor:`${d.color}10`,pointBackgroundColor:`${d.color}99`,borderDash:[5,4],borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:5,ticks:{stepSize:1,display:false},pointLabels:{color:"#4b433e",font:{weight:"700"}}}},plugins:{legend:{position:"bottom"}}}}));}),60);}
function domainReportHtml(d,r){const ranked=ELEMENTS.map(e=>({element:e,...r.scores[d.key][e.key]})).sort((a,b)=>b.abs-a.abs),main=ranked[0],balanced=ranked.filter(i=>i.abs<.5).map(i=>i.element.key);return `<section class="panel domain"><h3>${d.label}</h3><p>${domainNarrative(d,ranked)}</p><div class="chart-wrap"><canvas id="chart-${d.key}"></canvas></div><div class="callout"><h3>Core question</h3><p>${coreQuestion(d,main)}</p></div>${balanced.length?`<p><strong>What already has steadiness:</strong> ${balanced.join(", ")} seem relatively close to your desired balance.</p>`:""}</section>`}
function domainNarrative(d,ranked){const m=ranked[0],movement=m.diff>0?TEXT[m.element.key].plus:TEXT[m.element.key].minus,second=ranked[1],contrast=second&&second.abs>=.75?` ${second.element.key} adds a second layer to the theme.`:"";if(d.key==="Private")return `In your private life, ${m.element.key} stands out most. The longing is for ${movement}. This touches how you take up space in relationships, routines and closeness.${contrast}`;if(d.key==="Work")return `At work, ${m.element.key} becomes the clearest signal. It invites you to examine where your professional role does or does not match what you actually need: ${movement}.${contrast}`;return `In personal development, ${m.element.key} shows where growth is asking for attention. This is less about performing and more about allowing what is already emerging: ${movement}.${contrast}`}
function coreQuestion(d,item){const questions={Ether:"Where do you make real space to hear what is true before moving on?",Air:"Where could more lightness and movement arise without turning into restlessness?",Fire:"What would change if your desire, boundary or ambition became more visible?",Water:"Which connection asks for more honesty, grounding or reciprocity?",Earth:"What concrete form, rhythm or choice would help your insight land?"};return `Because ${item.element.key} in ${d.label} ${item.diff>0?"wants more room":"may be less central than it is now"}: ${questions[item.element.key]}`}
function nextStepText(r){const top=r.topMoves[0];if(state.person.goal==="Concrete first step")return `Begin with ${top.element.key} in ${top.domain.label}. Not because everything else is irrelevant, but because this is where current reality and desire differ most.`;if(state.person.goal==="Conversation starter")return `Use this profile as language for a conversation about what is often left unnamed: where strength is visible, where you hold back and what support is needed.`;return `This scan is a starting point, not a final verdict. The most valuable next step is to explore the strongest signal before trying to solve it.`}
function actionItems(r){const top=r.topMoves[0];const actions=[`Choose one situation this week where ${top.element.key} in ${top.domain.label} receives conscious attention.`,`Write down which old pattern usually takes the lead there.`,`Choose one micro-action of no more than 15 minutes that supports ${top.diff>0?TEXT[top.element.key].plus:TEXT[top.element.key].minus}.`];if(r.patterns[0])actions.push(`Bring the phrase "${r.patterns[0].title}" into coaching, journaling or peer reflection.`);return actions}
function avg(v){return v.reduce((s,x)=>s+x,0)/v.length}function round(v){return Math.round(v*10)/10}function signed(v){return `${v>0?"+":""}${round(v)}`}
function variant(key,options){const seed=`${state.person.name}|${state.person.role}|${state.person.focus}|${key}`;let h=0;for(let i=0;i<seed.length;i++)h=((h<<5)-h+seed.charCodeAt(i))|0;return options[Math.abs(h)%options.length]}
function escapeHtml(v){return String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
function optionList(options,selected){return options.map(o=>`<option ${o===selected?"selected":""}>${o}</option>`).join("")}
render();
